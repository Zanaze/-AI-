<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员登录</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body class="bg-light" style="background-color: #eef7ff !important;">
    <div class="container py-5">
        <div class="card shadow-sm col-md-5 mx-auto">
            <div class="card-body p-4">
                <h3 class="text-center mb-4">管理员登录</h3>
                {% if messages %}
                    {% for msg in messages %}
                        <div class="{% if 'error' in msg.tags %}text-danger{% else %}alert alert-{{ msg.tags }} alert-dismissible fade show{% endif %}" role="alert">
                            {{ msg }}
                            {% if 'error' not in msg.tags %}
                                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                            {% endif %}
                        </div>
                    {% endfor %}
                {% endif %}
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">账号</label>
                        <input type="text" class="form-control" name="username" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">密码</label>
                        <input type="password" class="form-control" name="password" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">登录</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
