<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>修改密码</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4" style="background-color: #eef7ff;">
    <div class="card col-md-6 mx-auto">
        <div class="card-header bg-primary text-white">修改登录密码</div>
        <div class="card-body">
            {% if messages %}
                {% for msg in messages %}
                    <div class="{% if 'error' in msg.tags %}text-danger{% else %}alert alert-{{ msg.tags }} alert-dismissible fade show{% endif %}" role="alert">
                        {{ msg }}
                        {% if 'error' not in msg.tags %}
                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                        {% endif %}
                    </div>
                {% endfor %}
            {% endif %}

            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">原密码 <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" name="old_pwd" required placeholder="默认密码为学号">
                </div>
                <div class="mb-3">
                    <label class="form-label">新密码 <span class="text-danger">*</span></label>
                    <input id="new-password" type="password" class="form-control" name="new_pwd" required placeholder="不少于 6 位">
                </div>
                <div class="mb-3">
                    <label class="form-label">确认新密码 <span class="text-danger">*</span></label>
                    <input id="confirm-password" type="password" class="form-control" name="confirm_pwd" required>
                    <div class="form-check mt-2">
                        <input class="form-check-input" type="checkbox" id="toggle-new-password">
                        <label class="form-check-label" for="toggle-new-password">显示当前输入的新密码</label>
                    </div>
                </div>
                <div class="d-flex justify-content-between">
                    <a href="{% url 'student_center' %}" class="btn btn-secondary">返回个人中心</a>
                    <button type="submit" class="btn btn-primary">保存密码</button>
                </div>
            </form>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const newPasswordInput = document.getElementById('new-password');
        const confirmPasswordInput = document.getElementById('confirm-password');
        const toggleNewPassword = document.getElementById('toggle-new-password');

        toggleNewPassword.addEventListener('change', function () {
            const inputType = this.checked ? 'text' : 'password';
            newPasswordInput.type = inputType;
            confirmPasswordInput.type = inputType;
        });
    </script>
</body>
</html>
