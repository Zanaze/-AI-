<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>编辑学生</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body style="background-color: #eef7ff;">
    {% include 'inc/header.html' %}
    <div class="container">
        <div class="card col-md-8 mx-auto">
            <div class="card-header">编辑学生信息</div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="row g-3 mb-3">
                        <div class="col-md-4">
                            <label class="form-label">学号 <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" name="sno" value="{{ student.sno }}" disabled>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">姓名 <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" name="name" value="{{ student.name }}">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">性别 <span class="text-danger">*</span></label>
                            <select class="form-select" name="gender">
                                <option value="男" {% if student.gender == '男' %}selected{% endif %}>男</option>
                                <option value="女" {% if student.gender == '女' %}selected{% endif %}>女</option>
                            </select>
                        </div>
                    </div>
                    <div class="row g-3 mb-3">
                        <div class="col-md-4">
                            <label class="form-label">所属院系 <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" name="dept" value="{{ student.dept }}">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">专业 <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" name="major" value="{{ student.major }}">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">年级 <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" name="grade" value="{{ student.grade }}">
                        </div>
                    </div>
                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label class="form-label">班级 <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" name="clazz" value="{{ student.clazz }}">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">联系方式</label>
                            <input type="text" class="form-control" name="phone" value="{{ student.phone|default:'' }}" placeholder="11 位手机号">
                        </div>
                    </div>
                    <div class="text-center">
                        <button type="submit" class="btn btn-primary">保存修改</button>
                        <a href="{% url 'student_list' %}" class="btn btn-secondary ms-2">返回</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
