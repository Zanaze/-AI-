<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>成绩管理</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body style="background-color: #eef7ff;">
    {% include 'inc/header.html' %}
    <div class="container">
        <div class="row g-4">
            <div class="col-lg-5">
                <div class="card">
                    <div class="card-header">录入成绩</div>
                    <div class="card-body">
                        <p class="text-muted">当前学生：{{ student.name }}（{{ student.sno }}）</p>
                        <form method="post">
                            {% csrf_token %}
                            <div class="mb-3">
                                <label class="form-label">科目</label>
                                <input type="text" class="form-control" name="subject" placeholder="例如 高等数学" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">成绩</label>
                                <input type="number" class="form-control" name="score" min="0" max="100" step="0.1" required>
                            </div>
                            <div class="d-flex gap-2">
                                <button type="submit" class="btn btn-primary">保存成绩</button>
                                <a href="{% url 'student_list' %}" class="btn btn-secondary">返回列表</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
            <div class="col-lg-7">
                <div class="card">
                    <div class="card-header">已录入成绩</div>
                    <div class="card-body p-0">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th>科目</th>
                                    <th>成绩</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody>
                                {% for score in scores %}
                                    <tr>
                                        <td>{{ score.subject }}</td>
                                        <td>{{ score.score }}</td>
                                        <td>
                                            <form method="post" action="{% url 'student_score_delete' score.id %}">
                                                {% csrf_token %}
                                                <button type="submit" class="btn btn-outline-danger btn-sm" onclick="return confirm('确认删除该成绩记录吗？');">删除</button>
                                            </form>
                                        </td>
                                    </tr>
                                {% empty %}
                                    <tr>
                                        <td colspan="3" class="text-center py-3">暂无成绩记录</td>
                                    </tr>
                                {% endfor %}
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
